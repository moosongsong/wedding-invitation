name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        env:
          # 리포지토리 Settings > Secrets and variables > Actions > Variables 에 등록한 값에서 주입
          # (미등록 시 코드의 예시값이 표시됨)
          VITE_NAVER_MAP_KEY: ${{ vars.VITE_NAVER_MAP_KEY }}
          VITE_WEDDING_DATE: ${{ vars.VITE_WEDDING_DATE }}
          VITE_VENUE_NAME: ${{ vars.VITE_VENUE_NAME }}
          VITE_VENUE_HALL: ${{ vars.VITE_VENUE_HALL }}
          VITE_VENUE_ADDRESS: ${{ vars.VITE_VENUE_ADDRESS }}
          VITE_CEREMONY_LAT: ${{ vars.VITE_CEREMONY_LAT }}
          VITE_CEREMONY_LNG: ${{ vars.VITE_CEREMONY_LNG }}
          VITE_RECEPTION_NAME: ${{ vars.VITE_RECEPTION_NAME }}
          VITE_RECEPTION_LAT: ${{ vars.VITE_RECEPTION_LAT }}
          VITE_RECEPTION_LNG: ${{ vars.VITE_RECEPTION_LNG }}
          VITE_GROOM_NAME: ${{ vars.VITE_GROOM_NAME }}
          VITE_GROOM_NAME_EN: ${{ vars.VITE_GROOM_NAME_EN }}
          VITE_GROOM_FIRST: ${{ vars.VITE_GROOM_FIRST }}
          VITE_BRIDE_NAME: ${{ vars.VITE_BRIDE_NAME }}
          VITE_BRIDE_NAME_EN: ${{ vars.VITE_BRIDE_NAME_EN }}
          VITE_BRIDE_FIRST: ${{ vars.VITE_BRIDE_FIRST }}
          VITE_GROOM_FATHER: ${{ vars.VITE_GROOM_FATHER }}
          VITE_GROOM_MOTHER: ${{ vars.VITE_GROOM_MOTHER }}
          VITE_BRIDE_FATHER: ${{ vars.VITE_BRIDE_FATHER }}
          VITE_BRIDE_MOTHER: ${{ vars.VITE_BRIDE_MOTHER }}
          VITE_ACCOUNT_GROOM: ${{ vars.VITE_ACCOUNT_GROOM }}
          VITE_ACCOUNT_GROOM_FATHER: ${{ vars.VITE_ACCOUNT_GROOM_FATHER }}
          VITE_ACCOUNT_GROOM_MOTHER: ${{ vars.VITE_ACCOUNT_GROOM_MOTHER }}
          VITE_ACCOUNT_BRIDE: ${{ vars.VITE_ACCOUNT_BRIDE }}
          VITE_ACCOUNT_BRIDE_FATHER: ${{ vars.VITE_ACCOUNT_BRIDE_FATHER }}
          VITE_ACCOUNT_BRIDE_MOTHER: ${{ vars.VITE_ACCOUNT_BRIDE_MOTHER }}
          VITE_PHONE_GROOM: ${{ vars.VITE_PHONE_GROOM }}
          VITE_PHONE_GROOM_FATHER: ${{ vars.VITE_PHONE_GROOM_FATHER }}
          VITE_PHONE_GROOM_MOTHER: ${{ vars.VITE_PHONE_GROOM_MOTHER }}
          VITE_PHONE_BRIDE: ${{ vars.VITE_PHONE_BRIDE }}
          VITE_PHONE_BRIDE_FATHER: ${{ vars.VITE_PHONE_BRIDE_FATHER }}
          VITE_PHONE_BRIDE_MOTHER: ${{ vars.VITE_PHONE_BRIDE_MOTHER }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
